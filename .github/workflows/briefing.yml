name: Briefing pipeline

on:
  schedule:
    # KST 06:30 / 12:30 / 18:30 = UTC 21:30(전일) / 03:30 / 09:30
    - cron: "30 21,3,9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r briefing/requirements.txt

      - name: Run briefing pipeline
        # 공개 채널 웹 스크래핑 방식이라 텔레그램 API 키·세션이 필요 없습니다.
        # "1"로 두면 briefing.json에 요약 하이라이트만 남기고 채널별 원문
        # 전체 아카이브는 커밋 히스토리에서 제외합니다("채널별 전체 보기"는 비게 됨).
        # 공개 채널이라 원문을 남겨도 무방하므로 기본값은 "0"(전체 보기 활성).
        env:
          BRIEFING_PUBLIC_SAFE: "0"
        run: python briefing/build.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json data/state.json data/keyword_history.json
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: update briefing data"
            git push
          fi
