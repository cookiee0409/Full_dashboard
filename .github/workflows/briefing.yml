name: Briefing pipeline

on:
  schedule:
    # KST 06:30 / 12:30 / 18:30 = UTC 21:30(전일) / 03:30 / 09:30
    - cron: "30 21,3,9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r briefing/requirements.txt

      - name: Run briefing pipeline
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          # 저장소가 public이면 "1"로 두세요. briefing.json에 요약 하이라이트만
          # 남기고 채널별 원문 전체 아카이브는 커밋에서 제외합니다.
          BRIEFING_PUBLIC_SAFE: "1"
        run: python briefing/build.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/briefing.json data/state.json data/keyword_history.json
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: update briefing data"
            git push
          fi
